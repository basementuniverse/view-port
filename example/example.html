<style>

body {
  background-color: #333;
}

canvas {
  width: 800px;
  height: 800px;
  background-color: #222;
  border: 3px black solid;
  border-radius: 5px;
  margin: 20px;
}

</style>
<canvas></canvas>
<script src="../build/index.js"></script>
<script src="./camera.js"></script>
<script>

const SCREEN = { x: 800, y: 800 };

const COLOURS = [
  '#ff000033',
  '#00ff0033',
  '#ffff0033',
  '#ff880033',
  '#0000ff33',
  '#88008833',
  '#ff008833',
  '#0088ff33',
];

const canvas = document.querySelector('canvas');
const context = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 800;

const Camera = window.default;

let viewPort = null;
let camera = null;

window.addEventListener('keydown', (event) => {
  switch (event.key) {
    case 'ArrowUp':
      camera.position.y -= 10;
      break;
    case 'ArrowDown':
      camera.position.y += 10;
      break;
    case 'ArrowLeft':
      camera.position.x -= 10;
      break;
    case 'ArrowRight':
      camera.position.x += 10;
      break;
    case '[':
      camera.scale += 0.1;
      break;
    case ']':
      camera.scale -= 0.1;
      break;
  }
});

class Chunk {
  constructor(position, color) {
    this.position = position;
    this.color = color;
  }

  update() {}

  draw(context) {
    context.fillStyle = this.color;
    context.fillRect(this.position.x, this.position.y, 150, 150);
  }
}

function init() {
  camera = new Camera({ x: 0, y: 0 });
  viewPort = new ViewPort({
    gridSize: { x: 150, y: 150 },
    generator: position => new Chunk(
      { x: position.x * 150, y: position.y * 150 },
      COLOURS[Math.floor(Math.random() * COLOURS.length)]
    ),
    spatialHashMaxElements: 200,
    debug: true,
  });
}

function update() {
  camera.update(SCREEN);
  viewPort.update(1 / 60, SCREEN, camera);
}

function draw() {
  context.clearRect(0, 0, 800, 800);
  context.save();

  camera.setTransforms(context);
  viewPort.draw(context, SCREEN, camera);

  context.restore();

  context.fillStyle = 'white';
  context.font = '20px sans-serif';
  context.fillText(`Chunks: ${viewPort.countChunks}`, 10, 30);
}

function loop() {
  update();
  draw();
  window.requestAnimationFrame(loop);
}

init();
loop();

</script>
